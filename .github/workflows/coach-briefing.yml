name: Coach Briefing

on:
  schedule:
    - cron: '0 13 * * *'   # 1 PM UTC = 6 AM PT
  workflow_dispatch:        # allow manual trigger

# Requires repo secret: ANTHROPIC_API_KEY

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Anthropic SDK
        run: pip install anthropic

      - name: Generate coach_briefing.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import os, json, datetime, re, statistics
          from anthropic import Anthropic

          # ---- Load recovery and training data ---------------------------------
          def load_json(path):
              try:
                  with open(path) as f:
                      return json.load(f)
              except (FileNotFoundError, json.JSONDecodeError):
                  return {}

          nutrition = load_json('nutrition_data.json')
          strava    = load_json('strava_data.json')

          # Pull today's vitals from nutrition_data (or most recent if today is empty)
          def best_entry(doc):
              # Return the most recent history entry that has at least one vital
              for h in [doc.get('today', {})] + doc.get('history', []):
                  if isinstance(h, dict) and any(h.get(k) for k in
                      ('hrv_ms', 'resting_hr', 'sleep_hours', 'recovery_score')):
                      return h
              return doc.get('today', {}) or {}

          vitals = best_entry(nutrition)
          history = nutrition.get('history', [])

          hrv_today     = vitals.get('hrv_ms')
          rhr_today     = vitals.get('resting_hr')
          sleep_today   = vitals.get('sleep_hours')
          sleep_eff     = vitals.get('sleep_efficiency_pct')
          rec_score     = vitals.get('recovery_score')
          vitals_date   = vitals.get('date', 'unknown')

          # 30-day baselines for trend context
          hrv_vals  = [h['hrv_ms'] for h in history if h.get('hrv_ms')]
          rhr_vals  = [h['resting_hr'] for h in history if h.get('resting_hr')]
          slp_vals  = [h['sleep_hours'] for h in history if h.get('sleep_hours')]
          hrv_avg   = round(statistics.mean(hrv_vals), 1) if len(hrv_vals) >= 3 else None
          rhr_avg   = round(statistics.mean(rhr_vals), 1) if len(rhr_vals) >= 3 else None
          slp_avg   = round(statistics.mean(slp_vals), 2) if len(slp_vals) >= 3 else None

          # Recent training load
          recent_runs  = strava.get('recent_runs', [])[:5]
          weekly_miles = strava.get('weekly_miles', 0)
          last_week_mi = strava.get('last_week_miles', 0)
          last_run     = recent_runs[0] if recent_runs else {}

          # Training plan constants
          RACE_DATE   = datetime.date(2026, 9, 18)
          PLAN_START  = datetime.date(2026, 1, 26)
          TOTAL_WEEKS = 22
          RECOVERY_WEEKS = {4, 8, 12, 16}

          today = datetime.date.today()
          days_to_race      = (RACE_DATE - today).days
          days_since_start  = (today - PLAN_START).days
          week_number       = max(1, days_since_start // 7 + 1)
          day_of_week       = today.strftime('%A')

          if week_number <= 3:
              phase = 'Base'
          elif week_number <= 9:
              phase = 'Build 1'
          elif week_number <= 15:
              phase = 'Build 2'
          elif week_number <= 19:
              phase = 'Peak'
          else:
              phase = 'Taper'

          is_recovery_week = week_number in RECOVERY_WEEKS

          context_summary = (
              f"Today: {today.isoformat()} ({day_of_week})\n"
              f"Goal race: Julian Alps 50K, Kranjska Gora, Slovenia ({RACE_DATE.isoformat()})\n"
              f"Days to race: {days_to_race}\n"
              f"Training week: {week_number} of {TOTAL_WEEKS}\n"
              f"Phase: {phase}\n"
              f"Recovery week: {'yes' if is_recovery_week else 'no'}"
          )

          system_prompt = (
              "You are Christopher Innes's personal ultra endurance coach. He's a 40-something "
              "executive (Head of Corp Dev at MNTN) training for the Julian Alps 50K in Slovenia, "
              "an alpine mountain ultra with ~2,500m of vert and sparse aid stations. He travels "
              "constantly for work, runs 6 days/week, and respects coaches who are specific, "
              "honest, and treat him like an athlete — not a beginner. Write in a direct, "
              "knowledgeable voice. No fluff, no platitudes, no hedging."
          )

          # Build recovery data block for the prompt
          def fmt(v, unit='', fallback='no data'):
              return f"{v}{unit}" if v is not None else fallback

          def score_label(s):
              if s is None: return 'no data'
              if s >= 67: return f"{s}/100 (Recovered)"
              if s >= 34: return f"{s}/100 (Moderate)"
              return f"{s}/100 (Compromised)"

          recovery_block = f"""RECOVERY DATA (from Apple Health via HAE, as of {vitals_date}):
          - Recovery score: {score_label(rec_score)}
          - HRV: {fmt(hrv_today, ' ms')} (30-day avg: {fmt(hrv_avg, ' ms')})
          - Resting HR: {fmt(rhr_today, ' bpm')} (30-day avg: {fmt(rhr_avg, ' bpm')})
          - Sleep: {fmt(sleep_today, 'h')} with {fmt(sleep_eff, '% efficiency')} (30-day avg: {fmt(slp_avg, 'h')})

          RECENT TRAINING (Strava):
          - This week so far: {weekly_miles} miles | Last week: {last_week_mi} miles
          - Last run ({last_run.get('date','?')}): {last_run.get('miles','?')} mi, {last_run.get('elevation_feet','?')} ft vert, avg HR {last_run.get('avg_hr','?')} bpm
          - Recent runs: {', '.join(f"{r.get('miles','?')}mi@{r.get('avg_hr','?')}bpm" for r in recent_runs[:3])}"""

          user_prompt = f"""Generate today's coaching briefing for Christopher.

          TRAINING CONTEXT:
          {context_summary}

          {recovery_block}

          PHASE GUIDANCE:
          - Base (wk 1-3): aerobic foundation, easy volume, build durability
          - Build 1 (wk 4-9): introduce structured workouts, hills, tempo
          - Build 2 (wk 10-15): race-specific stimulus, longer long runs, vert
          - Peak (wk 16-19): highest training load, race-pace work, big vert days
          - Taper (wk 20-22): cut volume, retain sharpness, sleep, fuel
          - Recovery weeks (4, 8, 12, 16): cut volume ~30-40%, no hard intensity

          DAY-OF-WEEK CONVENTIONS (typical):
          - Monday: recovery / easy Z2 or rest
          - Tuesday: quality (intervals, threshold)
          - Wednesday: hills / vert work
          - Thursday: easy recovery
          - Friday: easy or pre-long-run shakeout
          - Saturday: long run (peak day)
          - Sunday: second long effort or easy recovery

          Adjust for the actual day-of-week and phase above. Be specific to TODAY.

          OUTPUT FORMAT — return ONLY valid JSON, no prose, no markdown fences:
          {{
            "coaching": [
              {{ "type": "run",       "icon": "\U0001F3C3", "title": "Today's Run",  "message": "..." }},
              {{ "type": "nutrition", "icon": "\U0001F957", "title": "Fuel Right",   "message": "..." }},
              {{ "type": "recovery",  "icon": "\U0001F4A4", "title": "Recovery",     "message": "..." }},
              {{ "type": "mental",    "icon": "\U0001F9E0", "title": "Mental Edge",  "message": "..." }}
            ]
          }}

          Each message must be 3-5 substantive sentences, specific to this training phase, this
          day of the week, and the Julian Alps 50K's alpine demands. Reference the ACTUAL recovery
          numbers above — if HRV is suppressed, call it out; if the recovery score is in the red,
          adjust the workout recommendation accordingly; if sleep was short, address it. When data
          shows "no data", give general guidance for the phase/day without fabricating numbers.
          Reference real numbers (HR zones, paces, grams of carbs, hours of sleep) where it adds
          signal. No generic advice."""

          client = Anthropic()
          resp = client.messages.create(
              model='claude-haiku-4-5-20251001',
              max_tokens=2048,
              system=system_prompt,
              messages=[{'role': 'user', 'content': user_prompt}],
          )
          text = resp.content[0].text.strip()

          # Strip any accidental markdown fences and extract the JSON object
          text = re.sub(r'^```(?:json)?\s*|\s*```$', '', text, flags=re.MULTILINE).strip()
          m = re.search(r'\{.*\}', text, re.DOTALL)
          if not m:
              raise SystemExit(f"No JSON object in model output:\n{text}")
          parsed = json.loads(m.group(0))
          coaching = parsed['coaching'] if isinstance(parsed, dict) and 'coaching' in parsed else parsed

          output = {
              'generated': today.isoformat(),
              'generated_at': datetime.datetime.utcnow().isoformat() + 'Z',
              'athlete': {
                  'name': 'Christopher',
                  'goal_race': 'Julian Alps 50K',
                  'race_date': RACE_DATE.isoformat(),
              },
              'coaching': coaching,
          }
          with open('coach_briefing.json', 'w') as f:
              json.dump(output, f, indent=2, ensure_ascii=False)
          print(f"Generated briefing for {today}: week {week_number}/{TOTAL_WEEKS}, "
                f"{phase}{' (recovery)' if is_recovery_week else ''}, "
                f"{days_to_race} days to race")
          PYEOF

      - name: Commit and push coach_briefing.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coach_briefing.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update coach_briefing.json [skip ci]"
          git pull --rebase origin main && git push origin main
