name: Strava Sync

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Strava data and write strava_data.json
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import os, json, time, urllib.request, urllib.parse, datetime

          client_id     = os.environ['STRAVA_CLIENT_ID']
          client_secret = os.environ['STRAVA_CLIENT_SECRET']
          refresh_token = os.environ['STRAVA_REFRESH_TOKEN']

          # Refresh access token
          token_data = urllib.parse.urlencode({
            'client_id': client_id,
            'client_secret': client_secret,
            'refresh_token': refresh_token,
            'grant_type': 'refresh_token',
          }).encode()
          req = urllib.request.Request('https://www.strava.com/oauth/token',
                                       data=token_data, method='POST')
          with urllib.request.urlopen(req) as r:
            token = json.loads(r.read())
          access_token = token['access_token']

          # Monday 00:00:00 (UTC) anchors the weekly aggregations. Separately, fetch a
          # wider ~60-day window so the AthleteFlo fitness chart (PMC) and recent-runs
          # feed have a full ~2 months of activity, not just the current week.
          now = datetime.datetime.utcnow()
          this_monday = (now - datetime.timedelta(days=now.weekday())).replace(
            hour=0, minute=0, second=0, microsecond=0)
          last_monday = this_monday - datetime.timedelta(days=7)
          window_start = now - datetime.timedelta(days=60)
          after_ts = int(window_start.timestamp())

          # per_page=100 comfortably covers ~60 days of near-daily activity.
          url = f'https://www.strava.com/api/v3/athlete/activities?after={after_ts}&per_page=100'
          req = urllib.request.Request(url, headers={'Authorization': f'Bearer {access_token}'})
          with urllib.request.urlopen(req) as r:
            activities = json.loads(r.read())

          METERS_PER_MILE = 1609.344
          METERS_PER_FOOT = 0.3048

          def parse_local(a):
            # start_date_local is naive ISO; treat as local for week-bucketing.
            return datetime.datetime.fromisoformat(a['start_date_local'].replace('Z', ''))

          # Filter to running-equivalent activities. type=='Run' covers road and
          # trail runs. Hike and Walk are included so vert-heavy sessions logged
          # as hikes count toward training load and the fitness curve. VirtualRun
          # covers treadmill efforts. sport_type is checked as a secondary key
          # for newer Strava API responses where type may be 'Workout'.
          RUN_TYPES = {
            'Run', 'Trail Run', 'TrailRun', 'VirtualRun',
            'Hike', 'Walk',
          }
          def is_running_activity(a):
              t = a.get('type', '')
              st = a.get('sport_type', '')
              return t in RUN_TYPES or st in RUN_TYPES

          # Heart-rate-based TSS (hrTSS). Christopher's lactate threshold HR = 165 bpm.
          # Formula: hrTSS = (duration_sec × avgHr²) / (LTHR² × 3600) × 100
          # = 100 for exactly one hour at threshold. Fallback when HR data is missing:
          # ~10 TSS/mile endurance effort + 1 TSS/100 ft vert surcharge.
          LTHR = 165  # lactate threshold heart rate, bpm

          def estimate_tss(activity_dict):
              avg_hr = activity_dict.get('avg_hr', 0) or 0
              duration_sec = activity_dict.get('duration', 0) or 0
              miles = activity_dict.get('miles', 0) or 0
              elev_ft = activity_dict.get('elevation_feet', 0) or 0
              if avg_hr > 0 and duration_sec > 0:
                  return round((duration_sec * avg_hr ** 2) / (LTHR ** 2 * 3600) * 100, 1)
              return round(miles * 10 + elev_ft * 0.01, 1)

          runs = [a for a in activities if is_running_activity(a)]
          this_week, last_week = [], []
          for a in runs:
            ts = parse_local(a)
            if ts >= this_monday:
              this_week.append(a)
            elif ts >= last_monday:
              last_week.append(a)

          def sum_miles(arr):
            return round(sum(a['distance'] for a in arr) / METERS_PER_MILE, 1)
          def sum_elev_ft(arr):
            return round(sum(a.get('total_elevation_gain', 0) for a in arr) / METERS_PER_FOOT)
          def session_count(arr):
            # One session per local calendar day.
            return len({parse_local(a).date() for a in arr})

          weekly_miles            = sum_miles(this_week)
          total_elevation_feet    = sum_elev_ft(this_week)
          last_week_miles         = sum_miles(last_week)
          last_week_elevation_feet = sum_elev_ft(last_week)
          last_week_sessions      = session_count(last_week)

          # Format recent runs across the whole ~60-day window, most recent first, so
          # the AthleteFlo fitness chart (PMC) sees the full activity history — not just
          # the current week. Duration is emitted in raw seconds so the dashboard can
          # compute heart-rate-based TSS (hrTSS); avg_hr / max_hr come straight off the
          # activity summary (0 if no HR data).
          recent = []
          for a in sorted(runs, key=parse_local, reverse=True):
            avg_hr = a.get('average_heartrate')
            max_hr = a.get('max_heartrate')
            recent.append({
              'name': a.get('name', 'Run'),
              'date': a['start_date_local'][:10],
              'miles': round(a['distance'] / METERS_PER_MILE, 2),
              'elevation_feet': round(a.get('total_elevation_gain', 0) / METERS_PER_FOOT),
              'duration': int(a.get('moving_time', 0) or 0),
              'avg_hr': round(avg_hr) if avg_hr else 0,
              'max_hr': round(max_hr) if max_hr else 0,
            })

          # Processed activities for the current ISO week (for weekly_tss)
          this_week_recent = [
              a for a in recent
              if datetime.date.fromisoformat(a['date']) >= this_monday
          ]

          # Rolling-7d and 30d stats (last 7/14/30 calendar days, not ISO weeks)
          seven_days_ago    = now - datetime.timedelta(days=7)
          fourteen_days_ago = now - datetime.timedelta(days=14)
          thirty_days_ago   = now - datetime.timedelta(days=30)
          sixty_days_ago    = now - datetime.timedelta(days=60)

          cur7     = [a for a in runs if parse_local(a) >= seven_days_ago]
          prev7    = [a for a in runs if fourteen_days_ago <= parse_local(a) < seven_days_ago]
          cur30    = [a for a in runs if parse_local(a) >= thirty_days_ago]
          prior_30 = [a for a in runs if sixty_days_ago <= parse_local(a) < thirty_days_ago]

          # CTL / ATL / TSB fitness model (Performance Management Chart).
          # Built over the full 60-day window so the curve is well-seeded by the time
          # it reaches today. We convert the processed "recent" list back to daily
          # buckets, then apply the standard EWA recurrences:
          #   CTL(t) = CTL(t-1) + (TSS(t) − CTL(t-1)) / 42   (chronic, 42-day tau)
          #   ATL(t) = ATL(t-1) + (TSS(t) − ATL(t-1)) / 7    (acute, 7-day tau)
          #   TSB(t) = CTL(t-1) − ATL(t-1)                   (form = prior-day diff)
          PMC_DAYS = 60
          today_date = now.date()
          daily_tss_arr = [0.0] * PMC_DAYS
          for act in recent:
              act_date = datetime.date.fromisoformat(act['date'])
              offset = (today_date - act_date).days
              if 0 <= offset < PMC_DAYS:
                  daily_tss_arr[PMC_DAYS - 1 - offset] += estimate_tss(act)

          seed_tss = sum(daily_tss_arr) / (PMC_DAYS or 1)
          pmc_ctl, pmc_atl = seed_tss, seed_tss
          pmc_ctl_arr, pmc_atl_arr, pmc_tsb_arr = [], [], []
          for tss_val in daily_tss_arr:
              pmc_tsb_arr.append(round(pmc_ctl - pmc_atl, 1))
              pmc_ctl += (tss_val - pmc_ctl) / 42
              pmc_atl += (tss_val - pmc_atl) / 7
              pmc_ctl_arr.append(round(pmc_ctl, 1))
              pmc_atl_arr.append(round(pmc_atl, 1))

          current_ctl = pmc_ctl_arr[-1] if pmc_ctl_arr else 0.0
          current_atl = pmc_atl_arr[-1] if pmc_atl_arr else 0.0
          current_tsb = pmc_tsb_arr[-1] if pmc_tsb_arr else 0.0  # form before today's load

          # Weekly TSS = sum of TSS for all activities in the current ISO week
          weekly_tss_val = round(sum(estimate_tss(a) for a in this_week_recent), 1)

          output = {
            'generated': datetime.datetime.utcnow().isoformat() + 'Z',
            'ctl': round(current_ctl, 1),
            'atl': round(current_atl, 1),
            'tsb': round(current_tsb, 1),
            'weekly_tss': weekly_tss_val,
            'rolling_7d_miles': sum_miles(cur7),
            'prior_7d_miles': sum_miles(prev7),
            'rolling_7d_elevation': sum_elev_ft(cur7),
            'prior_7d_elevation': sum_elev_ft(prev7),
            'rolling_7d_sessions': session_count(cur7),
            'prior_7d_sessions': session_count(prev7),
            'long_run_30d': round(max((a['distance'] for a in cur30), default=0) / METERS_PER_MILE, 2),
            'prior_long_run_30d': round(max((a['distance'] for a in prior_30), default=0) / METERS_PER_MILE, 2),
            'weekly_miles': weekly_miles,
            'total_elevation_feet': total_elevation_feet,
            'last_week_miles': last_week_miles,
            'last_week_elevation_feet': last_week_elevation_feet,
            'last_week_sessions': last_week_sessions,
            'recent_runs': recent,
          }
          with open('strava_data.json', 'w') as f:
            json.dump(output, f, indent=2)
          print(f"Written: weekly_miles={weekly_miles}, elev={total_elevation_feet}ft, "
                f"last_week=({last_week_miles}mi/{last_week_elevation_feet}ft/{last_week_sessions}ses), "
                f"runs={len(recent)}")
          PYEOF

      - name: Commit and push strava_data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add strava_data.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update strava_data.json [skip ci]"
          git pull --rebase origin main && git push origin main
