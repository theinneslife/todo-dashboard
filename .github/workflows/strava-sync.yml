name: Strava Sync

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Strava data and write strava_data.json
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import os, json, time, urllib.request, urllib.parse, datetime

          client_id     = os.environ['STRAVA_CLIENT_ID']
          client_secret = os.environ['STRAVA_CLIENT_SECRET']
          refresh_token = os.environ['STRAVA_REFRESH_TOKEN']

          # Refresh access token
          token_data = urllib.parse.urlencode({
            'client_id': client_id,
            'client_secret': client_secret,
            'refresh_token': refresh_token,
            'grant_type': 'refresh_token',
          }).encode()
          req = urllib.request.Request('https://www.strava.com/oauth/token',
                                       data=token_data, method='POST')
          with urllib.request.urlopen(req) as r:
            token = json.loads(r.read())
          access_token = token['access_token']

          # Calculate Monday 00:00:00 local (use UTC for simplicity — close enough)
          now = datetime.datetime.utcnow()
          monday = now - datetime.timedelta(days=now.weekday())
          monday_midnight = monday.replace(hour=0, minute=0, second=0, microsecond=0)
          after_ts = int(monday_midnight.timestamp())

          # Fetch activities since Monday
          url = f'https://www.strava.com/api/v3/athlete/activities?after={after_ts}&per_page=100'
          req = urllib.request.Request(url, headers={'Authorization': f'Bearer {access_token}'})
          with urllib.request.urlopen(req) as r:
            activities = json.loads(r.read())

          # Filter runs and compute stats
          runs = [a for a in activities if a.get('type') == 'Run']
          weekly_miles = round(sum(a['distance'] for a in runs) / 1609.344, 1)

          # Format recent runs (most recent 5)
          def fmt_duration(sec):
            sec = int(sec or 0)
            h, rem = divmod(sec, 3600)
            m, s = divmod(rem, 60)
            return f'{h}:{m:02d}:{s:02d}' if h else f'{m}:{s:02d}'

          recent = []
          for a in runs[:5]:
            recent.append({
              'name': a.get('name', 'Run'),
              'date': a['start_date_local'][:10],
              'miles': round(a['distance'] / 1609.344, 2),
              'duration': fmt_duration(a.get('moving_time', 0)),
            })

          output = {
            'generated': datetime.datetime.utcnow().isoformat() + 'Z',
            'weekly_miles': weekly_miles,
            'recent_runs': recent,
          }
          with open('strava_data.json', 'w') as f:
            json.dump(output, f, indent=2)
          print(f"Written: weekly_miles={weekly_miles}, runs={len(recent)}")
          PYEOF

      - name: Commit and push strava_data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add strava_data.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update strava_data.json [skip ci]"
          git push
