<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TravelFlow — Trip Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; -webkit-text-size-adjust: 100%; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0e1a;
            color: #e2e8f0;
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            min-height: 100dvh;
        }
        a { color: #60a5fa; text-decoration: none; }
        a:hover { text-decoration: underline; }
        button { font-family: inherit; cursor: pointer; border: none; }
        input, textarea, select { font-family: inherit; font-size: 0.9rem; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

        /* ===== CSS VARIABLES ===== */
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1e293b;
            --bg-card-hover: #263548;
            --bg-input: #1e293b;
            --border: #334155;
            --border-light: #475569;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-blue-hover: #2563eb;
            --accent-green: #22c55e;
            --accent-green-dim: #166534;
            --accent-purple: #a855f7;
            --accent-purple-dim: #581c87;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --accent-red-dim: #7f1d1d;
            --trip-business: #3b82f6;
            --trip-personal: #22c55e;
            --trip-mixed: #a855f7;
            --radius: 12px;
            --radius-sm: 8px;
            --radius-xs: 6px;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.3), 0 2px 4px -2px rgba(0,0,0,0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.4), 0 4px 6px -4px rgba(0,0,0,0.3);
            --transition: all 0.2s ease;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        /* ===== APP NAV BAR ===== */
        .app-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .app-nav-links {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .app-nav-links a {
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: var(--transition);
        }
        .app-nav-links a:hover { background: var(--bg-card); color: var(--text-primary); text-decoration: none; }
        .app-nav-links a.active { background: var(--accent-blue); color: #fff; }
        .app-nav-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .app-nav-title svg { width: 24px; height: 24px; }
        .app-nav-actions { display: flex; gap: 8px; align-items: center; }
        .nav-btn {
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .nav-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }

        /* ===== MAIN CONTAINER ===== */
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: calc(80px + var(--safe-bottom));
        }

        /* ===== VIEWS ===== */
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.25s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* ===== TIMELINE VIEW ===== */
        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .timeline-header h1 { font-size: 1.5rem; font-weight: 700; }
        .timeline-nav {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .timeline-nav button {
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            transition: var(--transition);
        }
        .timeline-nav button:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        .timeline-nav .month-label { font-weight: 600; min-width: 140px; text-align: center; color: var(--text-primary); }

        /* Timeline Grid */
        .timeline-grid {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow-x: auto;
            margin-bottom: 32px;
        }
        .timeline-grid-inner {
            min-width: 100%;
            position: relative;
        }
        .timeline-days-header {
            display: flex;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--bg-card);
            z-index: 5;
        }
        .timeline-day-col {
            flex: 1;
            min-width: 28px;
            text-align: center;
            padding: 8px 2px;
            font-size: 0.7rem;
            color: var(--text-muted);
            border-right: 1px solid rgba(51,65,85,0.3);
        }
        .timeline-day-col.today { background: rgba(59,130,246,0.15); color: var(--accent-blue); font-weight: 700; }
        .timeline-day-col.weekend { color: var(--text-muted); opacity: 0.6; }
        .timeline-body { padding: 8px 0; min-height: 80px; position: relative; }
        .timeline-bar-row { position: relative; height: 36px; margin: 4px 0; }
        .timeline-bar {
            position: absolute;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: var(--transition);
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            top: 4px;
            z-index: 2;
        }
        .timeline-bar:hover { filter: brightness(1.15); transform: scaleY(1.1); }
        .timeline-bar.business { background: var(--trip-business); }
        .timeline-bar.personal { background: var(--trip-personal); }
        .timeline-bar.mixed { background: var(--trip-purple); background: var(--trip-mixed); }
        .timeline-today-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--accent-red);
            z-index: 3;
            pointer-events: none;
        }
        .timeline-today-line::after {
            content: '';
            position: absolute;
            top: -4px;
            left: -3px;
            width: 8px;
            height: 8px;
            background: var(--accent-red);
            border-radius: 50%;
        }
        .timeline-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        /* Upcoming Trips */
        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title .count {
            background: var(--bg-card);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .trip-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; margin-bottom: 32px; }

        /* ===== TRIP CARD ===== */
        .trip-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .trip-card:hover { background: var(--bg-card-hover); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        .trip-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }
        .trip-card.business::before { background: var(--trip-business); }
        .trip-card.personal::before { background: var(--trip-personal); }
        .trip-card.mixed::before { background: var(--trip-mixed); }
        .trip-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .trip-card-title { font-size: 1rem; font-weight: 600; color: var(--text-primary); }
        .trip-card-destination { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 12px; }
        .trip-card-dates {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .trip-card-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .trip-status {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .trip-status.planning { background: rgba(245,158,11,0.15); color: var(--accent-orange); }
        .trip-status.booked { background: rgba(59,130,246,0.15); color: var(--accent-blue); }
        .trip-status.in-progress { background: rgba(34,197,94,0.15); color: var(--accent-green); }
        .trip-status.completed { background: rgba(100,116,139,0.15); color: var(--text-muted); }
        .trip-type-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .trip-type-badge.business { background: rgba(59,130,246,0.15); color: var(--trip-business); }
        .trip-type-badge.personal { background: rgba(34,197,94,0.15); color: var(--trip-personal); }
        .trip-type-badge.mixed { background: rgba(168,85,247,0.15); color: var(--trip-mixed); }
        .countdown {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent-orange);
        }

        /* ===== TRIP DETAIL VIEW ===== */
        .detail-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            padding: 8px 0;
            margin-bottom: 16px;
            cursor: pointer;
            transition: var(--transition);
        }
        .detail-back:hover { color: var(--text-primary); text-decoration: none; }
        .detail-header {
            margin-bottom: 24px;
        }
        .detail-title-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }
        .detail-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; }
        .detail-destination { font-size: 1rem; color: var(--text-secondary); margin-bottom: 12px; }
        .detail-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }
        .detail-dates {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .detail-actions {
            display: flex;
            gap: 8px;
        }
        .btn-icon {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .btn-icon:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        .btn-icon.danger:hover { background: var(--accent-red-dim); color: var(--accent-red); }

        /* Tabs */
        .detail-tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }
        .detail-tab {
            padding: 12px 20px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
            background: transparent;
            border-bottom: 2px solid transparent;
            transition: var(--transition);
        }
        .detail-tab:hover { color: var(--text-secondary); }
        .detail-tab.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.2s ease; }

        /* ===== ITINERARY ===== */
        .itinerary-day {
            margin-bottom: 24px;
        }
        .itinerary-day-header {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            padding: 8px 0;
            margin-bottom: 8px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }
        .itinerary-day-header .day-label { color: var(--text-primary); }

        /* Booking Cards */
        .booking-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin-bottom: 8px;
            transition: var(--transition);
            position: relative;
        }
        .booking-card:hover { background: var(--bg-card-hover); }
        .booking-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .booking-type-icon {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-xs);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .booking-type-icon.flight { background: rgba(59,130,246,0.15); color: var(--accent-blue); }
        .booking-type-icon.hotel { background: rgba(168,85,247,0.15); color: var(--accent-purple); }
        .booking-type-icon.airbnb { background: rgba(239,68,68,0.15); color: var(--accent-red); }
        .booking-type-icon.restaurant { background: rgba(245,158,11,0.15); color: var(--accent-orange); }
        .booking-type-icon.activity { background: rgba(34,197,94,0.15); color: var(--accent-green); }
        .booking-type-icon.meeting { background: rgba(34,197,94,0.15); color: var(--accent-green); }
        .booking-type-icon.rental_car { background: rgba(100,116,139,0.15); color: var(--text-secondary); }
        .booking-info { flex: 1; margin-left: 12px; }
        .booking-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
        .booking-subtitle { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 6px; }
        .booking-detail-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 3px;
        }
        .booking-detail-row svg { width: 14px; height: 14px; flex-shrink: 0; }
        .booking-actions {
            display: flex;
            gap: 4px;
        }
        .booking-actions button {
            background: transparent;
            color: var(--text-muted);
            padding: 4px;
            border-radius: 4px;
            transition: var(--transition);
        }
        .booking-actions button:hover { color: var(--text-primary); background: var(--bg-card); }

        /* Copyable fields */
        .copyable {
            cursor: pointer;
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 6px;
            border-radius: 4px;
            transition: var(--transition);
        }
        .copyable:hover { background: rgba(59,130,246,0.1); color: var(--accent-blue); }
        .copyable .copy-icon { width: 12px; height: 12px; opacity: 0; transition: opacity 0.2s; }
        .copyable:hover .copy-icon { opacity: 1; }
        .copy-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--accent-green);
            color: #fff;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 600;
            z-index: 10000;
            transform: translateY(-20px);
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .copy-toast.show { transform: translateY(0); opacity: 1; }

        /* Flight card special layout */
        .flight-route {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px 0;
        }
        .flight-endpoint { text-align: center; }
        .flight-code { font-size: 1.1rem; font-weight: 700; color: var(--text-primary); }
        .flight-time { font-size: 0.78rem; color: var(--text-muted); }
        .flight-line {
            flex: 1;
            height: 1px;
            background: var(--border);
            position: relative;
        }
        .flight-line::after {
            content: '\u2708';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1rem;
            color: var(--accent-blue);
        }

        /* ===== TASKS TAB ===== */
        .task-phase {
            margin-bottom: 24px;
        }
        .task-phase-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .task-phase-title {
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .task-progress-bar {
            width: 100%;
            height: 6px;
            background: var(--bg-primary);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        .task-progress-fill {
            height: 100%;
            background: var(--accent-green);
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 6px;
            transition: var(--transition);
        }
        .task-item:hover { background: var(--bg-card-hover); }
        .task-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-light);
            border-radius: 50%;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .task-checkbox:hover { border-color: var(--accent-blue); }
        .task-checkbox.done {
            background: var(--accent-green);
            border-color: var(--accent-green);
        }
        .task-checkbox.done::after {
            content: '\u2713';
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .task-text { flex: 1; font-size: 0.85rem; }
        .task-text.done { text-decoration: line-through; color: var(--text-muted); }
        .task-due { font-size: 0.75rem; color: var(--text-muted); }
        .task-priority {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .task-priority.high { background: var(--accent-red); }
        .task-priority.medium { background: var(--accent-orange); }
        .task-priority.low { background: var(--accent-green); }
        .add-task-row {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .add-task-row input {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
        }
        .add-task-row input::placeholder { color: var(--text-muted); }

        /* ===== INFO TAB ===== */
        .info-section {
            margin-bottom: 24px;
        }
        .info-section h3 {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        .info-notes {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px;
            min-height: 80px;
            font-size: 0.85rem;
            color: var(--text-primary);
            white-space: pre-wrap;
        }
        .companion-list { display: flex; flex-direction: column; gap: 8px; }
        .companion-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
        }
        .companion-info { display: flex; align-items: center; gap: 10px; }
        .companion-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: #fff;
        }
        .companion-name { font-weight: 500; font-size: 0.85rem; }
        .companion-contact { font-size: 0.78rem; color: var(--text-muted); }

        /* ===== SEARCH VIEW ===== */
        .search-input-wrap {
            position: relative;
            margin-bottom: 20px;
        }
        .search-input-wrap svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-muted);
        }
        .search-input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px 16px 12px 42px;
            border-radius: var(--radius);
            font-size: 0.95rem;
            transition: var(--transition);
        }
        .search-input:focus { outline: none; border-color: var(--accent-blue); }
        .search-input::placeholder { color: var(--text-muted); }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            overflow-y: auto;
        }
        .modal-overlay.active { display: flex; animation: fadeIn 0.2s ease; }
        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            width: 100%;
            max-width: 600px;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }
        .modal-header h2 { font-size: 1.1rem; font-weight: 600; }
        .modal-close {
            background: transparent;
            color: var(--text-muted);
            font-size: 1.4rem;
            padding: 4px;
            line-height: 1;
        }
        .modal-close:hover { color: var(--text-primary); }
        .modal-body { padding: 24px; }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding: 16px 24px;
            border-top: 1px solid var(--border);
        }
        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
        }
        .form-input::placeholder, .form-textarea::placeholder { color: var(--text-muted); }
        .form-textarea { min-height: 80px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-select { appearance: none; cursor: pointer; }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 600;
            transition: var(--transition);
            white-space: nowrap;
        }
        .btn-primary { background: var(--accent-blue); color: #fff; }
        .btn-primary:hover { background: var(--accent-blue-hover); }
        .btn-secondary { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        .btn-danger { background: var(--accent-red-dim); color: var(--accent-red); }
        .btn-danger:hover { background: var(--accent-red); color: #fff; }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }

        /* ===== BOTTOM TAB BAR (Mobile) ===== */
        .bottom-tabs {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 8px 0;
            padding-bottom: calc(8px + var(--safe-bottom));
            z-index: 100;
        }
        .bottom-tabs-inner {
            display: flex;
            justify-content: space-around;
            max-width: 500px;
            margin: 0 auto;
        }
        .bottom-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.65rem;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }
        .bottom-tab svg { width: 22px; height: 22px; }
        .bottom-tab.active { color: var(--accent-blue); }
        .bottom-tab:hover { color: var(--text-secondary); }

        /* ===== TOAST NOTIFICATIONS ===== */
        .toast-container {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 10001;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 500;
            color: #fff;
            box-shadow: var(--shadow-lg);
            transform: translateX(120%);
            transition: transform 0.3s ease;
            max-width: 360px;
        }
        .toast.show { transform: translateX(0); }
        .toast.success { background: #166534; border: 1px solid var(--accent-green); }
        .toast.error { background: #7f1d1d; border: 1px solid var(--accent-red); }
        .toast.info { background: #1e3a5f; border: 1px solid var(--accent-blue); }

        /* ===== SHARE VIEW ===== */
        .share-banner {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            margin-bottom: 24px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* ===== EMPTY STATES ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5; }
        .empty-state h3 { font-size: 1.1rem; margin-bottom: 8px; color: var(--text-secondary); }
        .empty-state p { font-size: 0.85rem; margin-bottom: 20px; }

        /* ===== CONFIRM DIALOG ===== */
        .confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 10002;
            justify-content: center;
            align-items: center;
        }
        .confirm-overlay.active { display: flex; }
        .confirm-dialog {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .confirm-dialog h3 { margin-bottom: 8px; }
        .confirm-dialog p { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 20px; }
        .confirm-actions { display: flex; gap: 8px; justify-content: center; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .app-container { padding: 16px; padding-bottom: calc(90px + var(--safe-bottom)); }
            .bottom-tabs { display: block; }
            .app-nav-actions .nav-btn span { display: none; }
            .trip-cards { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .detail-title { font-size: 1.3rem; }
            .timeline-header h1 { font-size: 1.2rem; }
            .detail-tab { padding: 10px 14px; font-size: 0.82rem; }
            .flight-route { gap: 8px; }
        }

        /* ===== TAG CHIPS ===== */
        .tag {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 500;
            background: rgba(59,130,246,0.1);
            color: var(--accent-blue);
        }

        /* ===== LOADING SPINNER ===== */
        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 16px;
            color: var(--text-muted);
        }
    </style>
</head>

    <script>
    // ===== STATE =====
    let state = {
        trips: [],
        templates: [],
        settings: { defaultTimezone: 'America/Los_Angeles' }
    };
    let currentTripId = null;
    let timelineDate = new Date();
    let confirmCallback = null;
    const REPO = 'theinneslife/todo-dashboard';
    const FILE_PATH = 'trips.json';

    // Get token from URL
    function getToken() {
        const params = new URLSearchParams(window.location.search);
        return params.get('token') || '';
    }

    // Check if share mode
    function isShareMode() {
        const params = new URLSearchParams(window.location.search);
        return params.has('share');
    }

    function getShareTripId() {
        const params = new URLSearchParams(window.location.search);
        return params.get('share');
    }

    // ===== GITHUB API =====
    async function fetchTrips() {
        const token = getToken();
        if (!token) {
            showToast('No auth token found. Add ?token=YOUR_TOKEN to URL.', 'error');
            document.getElementById('loadingScreen').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">No auth token found.<br>Add ?token=YOUR_TOKEN to the URL.</div>';
            return;
        }
        try {
            const resp = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`, {
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' },
                cache: 'no-store'
            });
            if (resp.status === 404) {
                // File doesn't exist yet, use defaults
                state = { trips: [], templates: [], settings: { defaultTimezone: 'America/Los_Angeles' } };
                return;
            }
            const data = await resp.json();
            window.__tripsSha = data.sha;
            const decoded = decodeBase64UTF8(data.content);
            state = JSON.parse(decoded);
            if (!state.trips) state.trips = [];
            if (!state.templates) state.templates = [];
            if (!state.settings) state.settings = { defaultTimezone: 'America/Los_Angeles' };
            // Cache to localStorage
            try { localStorage.setItem('travelflow_cache', JSON.stringify(state)); } catch(e) {}
        } catch (err) {
            console.error('Failed to fetch trips:', err);
            // Try localStorage cache
            try {
                const cached = localStorage.getItem('travelflow_cache');
                if (cached) {
                    state = JSON.parse(cached);
                    showToast('Loaded from cache (offline mode)', 'info');
                    return;
                }
            } catch(e) {}
            showToast('Failed to load trips: ' + err.message, 'error');
        }
    }

    async function saveToGitHub() {
        const token = getToken();
        if (!token) { showToast('No auth token', 'error'); return; }

        // Update timestamps
        state.trips.forEach(t => { t.updatedAt = new Date().toISOString(); });

        const content = JSON.stringify(state, null, 2);
        const encoded = encodeBase64UTF8(content);

        const body = {
            message: 'Update trips.json via TravelFlow',
            content: encoded,
            branch: 'main'
        };
        if (window.__tripsSha) body.sha = window.__tripsSha;

        try {
            const resp = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            });
            if (!resp.ok) {
                const errData = await resp.json();
                throw new Error(errData.message || 'Save failed');
            }
            const result = await resp.json();
            window.__tripsSha = result.content.sha;
            // Update cache
            try { localStorage.setItem('travelflow_cache', JSON.stringify(state)); } catch(e) {}
            showToast('Saved successfully', 'success');
        } catch (err) {
            console.error('Save failed:', err);
            showToast('Save failed: ' + err.message, 'error');
        }
    }

    // Proper UTF-8 Base64 encoding/decoding
    function encodeBase64UTF8(str) {
        const encoder = new TextEncoder();
        const bytes = encoder.encode(str);
        let binary = '';
        for (let i = 0; i < bytes.length; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary);
    }

    function decodeBase64UTF8(base64) {
        const raw = atob(base64.replace(/\n/g, ''));
        const bytes = new Uint8Array(raw.length);
        for (let i = 0; i < raw.length; i++) {
            bytes[i] = raw.charCodeAt(i);
        }
        return new TextDecoder().decode(bytes);
    }

    // ===== DATE HELPERS =====
    function formatDate(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr + 'T00:00:00');
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function formatDateShort(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr + 'T00:00:00');
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function formatTime(timeStr) {
        if (!timeStr) return '';
        const [h, m] = timeStr.split(':');
        const hr = parseInt(h);
        const ampm = hr >= 12 ? 'PM' : 'AM';
        const hr12 = hr % 12 || 12;
        return `${hr12}:${m} ${ampm}`;
    }

    function daysBetween(d1, d2) {
        const a = new Date(d1 + 'T00:00:00');
        const b = new Date(d2 + 'T00:00:00');
        return Math.round((b - a) / (1000 * 60 * 60 * 24));
    }

    function todayStr() {
        return new Date().toISOString().split('T')[0];
    }

    function daysUntil(dateStr) {
        return daysBetween(todayStr(), dateStr);
    }

    function getDayName(dateStr) {
        return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short' });
    }

    // ===== AUTO-UPDATE STATUS =====
    function autoUpdateStatuses() {
        const today = todayStr();
        state.trips.forEach(trip => {
            if (trip.status === 'completed') return;
            if (trip.dates.start <= today && trip.dates.end >= today) {
                trip.status = 'in-progress';
            } else if (trip.dates.end < today && trip.status !== 'completed') {
                trip.status = 'completed';
            }
        });
    }

    // ===== RENDER: TIMELINE =====
    function renderTimeline() {
        const year = timelineDate.getFullYear();
        const month = timelineDate.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const today = todayStr();
        const monthName = timelineDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        document.getElementById('timelineMonthLabel').textContent = monthName;

        // Build day headers
        let daysHtml = '';
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const dow = new Date(year, month, d).getDay();
            const isToday = dateStr === today;
            const isWeekend = dow === 0 || dow === 6;
            daysHtml += `<div class="timeline-day-col ${isToday ? 'today' : ''} ${isWeekend ? 'weekend' : ''}">${d}</div>`;
        }

        // Find trips that overlap this month
        const monthStart = `${year}-${String(month + 1).padStart(2, '0')}-01`;
        const monthEnd = `${year}-${String(month + 1).padStart(2, '0')}-${String(daysInMonth).padStart(2, '0')}`;

        const overlapping = state.trips.filter(t => t.dates.start <= monthEnd && t.dates.end >= monthStart);

        // Build bars
        let barsHtml = '';
        overlapping.forEach(trip => {
            const startDay = Math.max(1, trip.dates.start >= monthStart ? parseInt(trip.dates.start.split('-')[2]) : 1);
            const endDay = Math.min(daysInMonth, trip.dates.end <= monthEnd ? parseInt(trip.dates.end.split('-')[2]) : daysInMonth);
            const left = ((startDay - 1) / daysInMonth) * 100;
            const width = ((endDay - startDay + 1) / daysInMonth) * 100;
            barsHtml += `<div class="timeline-bar-row"><div class="timeline-bar ${trip.type}" style="left:${left}%;width:${width}%;" onclick="openTripDetail('${trip.id}')" title="${trip.title}">${trip.title}</div></div>`;
        });

        // Today line
        let todayLine = '';
        if (today >= monthStart && today <= monthEnd) {
            const todayDay = parseInt(today.split('-')[2]);
            const todayPos = ((todayDay - 0.5) / daysInMonth) * 100;
            todayLine = `<div class="timeline-today-line" style="left:${todayPos}%"></div>`;
        }

        const grid = document.getElementById('timelineGrid');
        if (overlapping.length === 0 && !todayLine) {
            grid.innerHTML = `<div class="timeline-grid-inner"><div class="timeline-days-header">${daysHtml}</div><div class="timeline-body"><div class="timeline-empty">No trips this month</div></div></div>`;
        } else {
            grid.innerHTML = `<div class="timeline-grid-inner"><div class="timeline-days-header">${daysHtml}</div><div class="timeline-body" style="position:relative;">${todayLine}${barsHtml || '<div class="timeline-empty">No trips this month</div>'}</div></div>`;
        }
    }

    function changeMonth(delta) {
        timelineDate.setMonth(timelineDate.getMonth() + delta);
        renderTimeline();
    }

    function goToToday() {
        timelineDate = new Date();
        renderTimeline();
    }

    // ===== RENDER: TRIP CARDS =====
    function renderTripCards() {
        const today = todayStr();
        const upcoming = state.trips
            .filter(t => t.dates.start >= today || (t.status === 'in-progress'))
            .sort((a, b) => a.dates.start.localeCompare(b.dates.start));
        const past = state.trips
            .filter(t => t.dates.end < today && t.status !== 'in-progress')
            .sort((a, b) => b.dates.start.localeCompare(a.dates.start));

        document.getElementById('upcomingCount').textContent = upcoming.length;
        document.getElementById('pastCount').textContent = past.length;

        document.getElementById('upcomingTrips').innerHTML = upcoming.length ? upcoming.map(renderTripCard).join('') : '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg><h3>No upcoming trips</h3><p>Plan your next adventure!</p><button class="btn btn-primary" onclick="openTripModal()">Add Trip</button></div>';

        document.getElementById('pastTrips').innerHTML = past.map(renderTripCard).join('');

        // Current trip banner
        const current = state.trips.find(t => t.status === 'in-progress');
        const banner = document.getElementById('currentTripBanner');
        if (current) {
            const daysLeft = daysUntil(current.dates.end);
            banner.style.display = 'block';
            banner.innerHTML = `<div class="trip-card ${current.type}" onclick="openTripDetail('${current.id}')" style="border:2px solid var(--accent-green);margin-bottom:24px;"><div class="trip-card-header"><div><div class="trip-card-title">${esc(current.title)}</div><div class="trip-card-destination">${esc(current.destination.city)}${current.destination.country ? ', ' + esc(current.destination.country) : ''}</div></div><span class="trip-status in-progress">In Progress</span></div><div class="trip-card-dates">${formatDateShort(current.dates.start)} - ${formatDateShort(current.dates.end)} &bull; ${daysLeft > 0 ? daysLeft + ' days left' : 'Last day!'}</div></div>`;
        } else {
            banner.style.display = 'none';
        }
    }

    function renderTripCard(trip) {
        const today = todayStr();
        const days = daysUntil(trip.dates.start);
        let countdown = '';
        if (days > 0) countdown = `<span class="countdown">in ${days} day${days !== 1 ? 's' : ''}</span>`;
        else if (days === 0) countdown = `<span class="countdown" style="color:var(--accent-green)">Today!</span>`;

        const bookingCount = (trip.bookings || []).length;
        const tasksDone = (trip.tasks || []).filter(t => t.status === 'done').length;
        const tasksTotal = (trip.tasks || []).length;

        return `<div class="trip-card ${trip.type}" onclick="openTripDetail('${trip.id}')">
            <div class="trip-card-header">
                <div class="trip-card-title">${esc(trip.title)}</div>
                ${countdown}
            </div>
            <div class="trip-card-destination">${esc(trip.destination?.city || '')}${trip.destination?.country ? ', ' + esc(trip.destination.country) : ''}</div>
            <div class="trip-card-dates">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                ${formatDateShort(trip.dates?.start)} - ${formatDateShort(trip.dates?.end)}
            </div>
            <div class="trip-card-meta">
                <span class="trip-status ${trip.status}">${trip.status}</span>
                <span class="trip-type-badge ${trip.type}">${trip.type}</span>
                ${bookingCount ? `<span class="tag">${bookingCount} booking${bookingCount !== 1 ? 's' : ''}</span>` : ''}
                ${tasksTotal ? `<span class="tag">${tasksDone}/${tasksTotal} tasks</span>` : ''}
            </div>
        </div>`;
    }

    // ===== RENDER: TRIP DETAIL =====
    function openTripDetail(tripId) {
        currentTripId = tripId;
        renderTripDetail(tripId);
        showView('viewDetail');
    }

    function renderTripDetail(tripId) {
        const trip = state.trips.find(t => t.id === tripId);
        if (!trip) return;

        // Header
        const daysCount = daysBetween(trip.dates.start, trip.dates.end) + 1;
        document.getElementById('detailHeader').innerHTML = `
            <div class="detail-title-row">
                <div>
                    <div class="detail-title">${esc(trip.title)}</div>
                    <div class="detail-destination">${esc(trip.destination?.city || '')}${trip.destination?.country ? ', ' + esc(trip.destination.country) : ''}</div>
                </div>
                <div class="detail-actions">
                    <button class="btn-icon" onclick="openTripModal('${trip.id}')" title="Edit"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                    <button class="btn-icon" onclick="exportTripICS('${trip.id}')" title="Export .ics"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></button>
                    <button class="btn-icon danger" onclick="deleteTrip('${trip.id}')" title="Delete"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14H7L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>
                </div>
            </div>
            <div class="detail-meta">
                <span class="trip-status ${trip.status}">${trip.status}</span>
                <span class="trip-type-badge ${trip.type}">${trip.type}</span>
                ${trip.tags ? trip.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('') : ''}
            </div>
            <div class="detail-dates">${formatDate(trip.dates?.start)} - ${formatDate(trip.dates?.end)} (${daysCount} day${daysCount !== 1 ? 's' : ''})</div>
            ${trip.purpose ? `<div style="font-size:0.85rem;color:var(--text-secondary);margin-top:4px;">${esc(trip.purpose)}</div>` : ''}
        `;

        renderItinerary(trip);
        renderTasks(trip);
        renderInfo(trip);
    }

    function renderItinerary(trip) {
        const container = document.getElementById('tabItinerary');
        const bookings = (trip.bookings || []).sort((a, b) => {
            const cmp = (a.date || '').localeCompare(b.date || '');
            return cmp !== 0 ? cmp : (a.time || '').localeCompare(b.time || '');
        });

        if (bookings.length === 0) {
            container.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><h3>No bookings yet</h3><p>Add flights, hotels, restaurants, and more.</p><button class="btn btn-primary" onclick="openBookingModal('${trip.id}')">Add Booking</button></div>`;
            return;
        }

        // Group by date
        const grouped = {};
        bookings.forEach(b => {
            const d = b.date || 'Unscheduled';
            if (!grouped[d]) grouped[d] = [];
            grouped[d].push(b);
        });

        let html = `<div style="display:flex;justify-content:flex-end;margin-bottom:16px;"><button class="btn btn-primary btn-sm" onclick="openBookingModal('${trip.id}')">+ Add Booking</button></div>`;

        Object.keys(grouped).sort().forEach(date => {
            const dayLabel = date === 'Unscheduled' ? 'Unscheduled' : `${getDayName(date)}, ${formatDate(date)}`;
            const isToday = date === todayStr();
            html += `<div class="itinerary-day"><div class="itinerary-day-header"><span class="day-label">${dayLabel}</span>${isToday ? '<span style="color:var(--accent-green);font-size:0.8rem;">Today</span>' : ''}</div>`;
            grouped[date].forEach(b => { html += renderBookingCard(b, trip.id); });
            html += '</div>';
        });

        container.innerHTML = html;
    }

            flight: '\u2708\uFE0F', hotel: '\uD83C\uDFE8', airbnb: '\uD83C\uDFE0', restaurant: '\uD83C\uDF7D\uFE0F',
            activity: '\uD83C\uDFAF', meeting: '\uD83E\uDD1D', rental_car: '\uD83D\uDE97'

                    <div class="flight-line"></div>

                ${d.bConfCode ? `<div class="booking-detail-row">Conf: <span class="copyable" onclick="event.stopPropagation();copyText('${esc(d.bConfCode)}','confirmation code')">${esc(d.bConfCode)} <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span></div>` : ''}
                ${d.bWifi ? `<div class="booking-detail-row">WiFi: <span class="copyable" onclick="event.stopPropagation();copyText('${esc(d.bWifi)}','WiFi password')">${esc(d.bWifi)} <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span></div>` : ''}
                ${d.bAccessCode ? `<div class="booking-detail-row">Access: <span class="copyable" onclick="event.stopPropagation();copyText('${esc(d.bAccessCode)}','access code')">${esc(d.bAccessCode)} <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span></div>` : ''}
                ${d.bHostName ? `<div class="booking-detail-row">Host: ${esc(d.bHostName)}${d.bHostPhone ? ' \u2022 ' + esc(d.bHostPhone) : ''}</div>` : ''}
                ${d.bPhone ? `<div class="booking-detail-row">Phone: ${esc(d.bPhone)}</div>` : ''}

        } else if (booking.type === 'restaurant') {

                ${d.bAddress ? `<div class="booking-detail-row"><span class="copyable" onclick="event.stopPropagation();copyText('${esc(d.bAddress)}','address')">${esc(d.bAddress)} <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span></div>` : ''}

                ${d.bNotes || d.bAgenda ? `<div class="booking-detail-row" style="white-space:pre-wrap;margin-top:4px;">${esc(d.bNotes || d.bAgenda)}</div>` : ''}

                    <div class="booking-info">
                        <div class="booking-title">${esc(booking.title || booking.type)}</div>
                        <div class="booking-subtitle">${booking.type.replace('_', ' ')}${booking.time ? ' \u2022 ' + formatTime(booking.time) : ''}</div>

                </div>

                    <button onclick="event.stopPropagation();openBookingModal('${tripId}','${booking.id}')" title="Edit"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                    <button onclick="event.stopPropagation();deleteBooking('${tripId}','${booking.id}')" title="Delete"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14H7L5 6"/></svg></button>
                </div>
            </div>
            ${content}
        </div>`;
    }

    // ===== RENDER: TASKS =====
    function renderTasks(trip) {
        const container = document.getElementById('tabTasks');
        const tasks = trip.tasks || [];
        const phases = ['pre-trip', 'during', 'post-trip'];
        const phaseLabels = { 'pre-trip': 'Pre-trip', 'during': 'During Trip', 'post-trip': 'Post-trip' };
        const phaseIcons = { 'pre-trip': '\uD83D\uDCCB', 'during': '\u2708\uFE0F', 'post-trip': '\u2705' };

        const totalTasks = tasks.length;
        const doneTasks = tasks.filter(t => t.status === 'done').length;
        const pct = totalTasks > 0 ? Math.round((doneTasks / totalTasks) * 100) : 0;

        let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <div><strong>${doneTasks}/${totalTasks}</strong> tasks completed (${pct}%)</div>
            <button class="btn btn-primary btn-sm" onclick="openTaskModal('${trip.id}')">+ Add Task</button>
        </div>
        <div class="task-progress-bar"><div class="task-progress-fill" style="width:${pct}%"></div></div>`;

        phases.forEach(phase => {
            const phaseTasks = tasks.filter(t => t.phase === phase);
            if (phaseTasks.length === 0 && totalTasks > 0) return;

            html += `<div class="task-phase">
                <div class="task-phase-header"><div class="task-phase-title">${phaseIcons[phase]} ${phaseLabels[phase]} <span class="count">${phaseTasks.length}</span></div></div>`;

            phaseTasks.forEach(task => {
                const isDone = task.status === 'done';
                html += `<div class="task-item">
                    <div class="task-checkbox ${isDone ? 'done' : ''}" onclick="toggleTask('${trip.id}','${task.id}')"></div>
                    <div class="task-priority ${task.priority || 'medium'}"></div>
                    <span class="task-text ${isDone ? 'done' : ''}">${esc(task.title)}</span>
                    ${task.dueDate ? `<span class="task-due">${formatDateShort(task.dueDate)}</span>` : ''}
                    <button style="background:transparent;color:var(--text-muted);padding:2px;" onclick="deleteTask('${trip.id}','${task.id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
                </div>`;
            });
            html += '</div>';
        });

        if (totalTasks === 0) {
            html += '<div class="empty-state" style="padding:30px;"><h3>No tasks yet</h3><p>Add pre-trip, during, and post-trip tasks.</p></div>';
        }

        container.innerHTML = html;
    }

    // ===== RENDER: INFO TAB =====
    function renderInfo(trip) {
        const container = document.getElementById('tabInfo');

        let companionsHtml = '';
        if (trip.companions && trip.companions.length > 0) {
            companionsHtml = '<div class="companion-list">';
            trip.companions.forEach((c, i) => {
                const initials = c.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
                companionsHtml += `<div class="companion-item">
                    <div class="companion-info">
                        <div class="companion-avatar">${initials}</div>
                        <div><div class="companion-name">${esc(c.name)}</div><div class="companion-contact">${esc(c.email || c.phone || '')}</div></div>
                    </div>
                    <button class="btn-icon danger" style="width:28px;height:28px;" onclick="removeCompanion('${trip.id}',${i})" title="Remove"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
                </div>`;
            });
            companionsHtml += '</div>';
        } else {
            companionsHtml = '<p style="color:var(--text-muted);font-size:0.85rem;">No companions added.</p>';
        }

        // Share link
        const shareUrl = `${window.location.origin}${window.location.pathname}?share=${trip.id}&token=${getToken()}`;

        container.innerHTML = `
            <div class="info-section">
                <h3>Notes</h3>
                <div class="info-notes">${trip.notes ? esc(trip.notes) : '<span style="color:var(--text-muted);">No notes.</span>'}</div>
            </div>
            <div class="info-section">
                <h3>Companions <button class="btn btn-sm btn-secondary" style="margin-left:8px;" onclick="openCompanionModal('${trip.id}')">+ Add</button></h3>
                ${companionsHtml}
            </div>
            ${trip.budget?.estimated ? `<div class="info-section"><h3>Budget</h3><div style="font-size:1.2rem;font-weight:700;color:var(--text-primary);">${trip.budget.currency} ${trip.budget.estimated.toLocaleString()}</div></div>` : ''}
            <div class="info-section">
                <h3>Share Itinerary</h3>
                <div style="display:flex;gap:8px;align-items:center;">
                    <input type="text" class="form-input" value="${shareUrl}" readonly style="font-size:0.78rem;" id="shareUrlInput">
                    <button class="btn btn-sm btn-secondary" onclick="copyText(document.getElementById('shareUrlInput').value,'share link')">Copy</button>
                </div>
                <p style="font-size:0.75rem;color:var(--text-muted);margin-top:6px;">Anyone with this link can view a read-only itinerary.</p>
            </div>
        `;
    }

    // ===== SEARCH =====
    function performSearch(query) {
        const q = query.toLowerCase().trim();
        const container = document.getElementById('searchResults');
        if (!q) { container.innerHTML = ''; return; }

        const results = state.trips.filter(trip => {
            const searchStr = [
                trip.title, trip.destination?.city, trip.destination?.country, trip.purpose,
                ...(trip.tags || []),
                ...(trip.bookings || []).map(b => b.title + ' ' + JSON.stringify(b.details)),
                trip.notes
            ].join(' ').toLowerCase();
            return searchStr.includes(q);
        });

        if (results.length === 0) {
            container.innerHTML = '<div class="empty-state"><h3>No results</h3><p>Try a different search term.</p></div>';
        } else {
            container.innerHTML = '<div class="trip-cards">' + results.map(renderTripCard).join('') + '</div>';
        }
    }

    // ===== CURRENT TRIP (mobile) =====
    function renderCurrentTrip() {
        const container = document.getElementById('currentTripContent');
        const current = state.trips.find(t => t.status === 'in-progress');

        if (!current) {
            // Show nearest upcoming
            const today = todayStr();
            const upcoming = state.trips.filter(t => t.dates.start > today).sort((a, b) => a.dates.start.localeCompare(b.dates.start));
            if (upcoming.length > 0) {
                container.innerHTML = `<div style="text-align:center;padding:20px;"><p style="color:var(--text-muted);margin-bottom:16px;">No trip in progress. Next trip:</p></div><div class="trip-cards">${renderTripCard(upcoming[0])}</div>`;
            } else {
                container.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><h3>No current trip</h3><p>Your in-progress trip will appear here.</p></div>';
            }
            return;
        }

        // Show current trip with next event
        const bookings = (current.bookings || []).sort((a, b) => {
            const cmp = (a.date || '').localeCompare(b.date || '');
            return cmp !== 0 ? cmp : (a.time || '').localeCompare(b.time || '');
        });

        const now = new Date();
        const todayS = todayStr();
        const currentTime = now.toTimeString().slice(0, 5);
        const nextBooking = bookings.find(b => b.date > todayS || (b.date === todayS && (b.time || '24:00') >= currentTime));

        let html = `<h2 style="margin-bottom:16px;">${esc(current.title)}</h2>
            <div style="color:var(--text-secondary);margin-bottom:20px;">${esc(current.destination?.city || '')} \u2022 ${formatDateShort(current.dates.start)} - ${formatDateShort(current.dates.end)}</div>`;

        if (nextBooking) {
            html += `<div class="section-title">Next Up</div>${renderBookingCard(nextBooking, current.id)}`;
        }

        html += `<div class="section-title" style="margin-top:20px;">Today's Itinerary</div>`;
        const todayBookings = bookings.filter(b => b.date === todayS);
        if (todayBookings.length > 0) {
            todayBookings.forEach(b => { html += renderBookingCard(b, current.id); });
        } else {
            html += '<p style="color:var(--text-muted);font-size:0.85rem;">Nothing scheduled for today.</p>';
        }

        html += `<div style="margin-top:20px;text-align:center;"><button class="btn btn-primary" onclick="openTripDetail('${current.id}')">View Full Trip</button></div>`;
        container.innerHTML = html;
    }

    // ===== ICS EXPORT =====
    function formatICSDate(dateStr, timeStr) {
        if (!dateStr) return '';
        const d = dateStr.replace(/-/g, '');
        if (timeStr) {
            const t = timeStr.replace(/:/g, '') + '00';
            return d + 'T' + t;
        }
        return d;
    }

    function formatICSDateAllDay(dateStr) {
        return dateStr ? dateStr.replace(/-/g, '') : '';
    }

    function generateICS(events, filename) {
        let ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//TravelFlow//EN\r\nCALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\n';
        events.forEach(evt => {
            ics += 'BEGIN:VEVENT\r\n';
            ics += `UID:${evt.uid}@travelflow\r\n`;
            ics += `SUMMARY:${escICS(evt.summary)}\r\n`;
            if (evt.allDay) {
                ics += `DTSTART;VALUE=DATE:${evt.dtstart}\r\n`;
                ics += `DTEND;VALUE=DATE:${evt.dtend}\r\n`;
            } else {
                ics += `DTSTART:${evt.dtstart}\r\n`;
                ics += `DTEND:${evt.dtend}\r\n`;
            }
            if (evt.location) ics += `LOCATION:${escICS(evt.location)}\r\n`;
            if (evt.description) ics += `DESCRIPTION:${escICS(evt.description)}\r\n`;
            ics += 'END:VEVENT\r\n';
        });
        ics += 'END:VCALENDAR\r\n';

        const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
        showToast('Calendar file downloaded', 'success');
    }

    function escICS(str) {
        return (str || '').replace(/\\/g, '\\\\').replace(/;/g, '\\;').replace(/,/g, '\\,').replace(/\n/g, '\\n');
    }

    function exportTripICS(tripId) {
        const trip = state.trips.find(t => t.id === tripId);
        if (!trip) return;
        const events = [];

        (trip.bookings || []).forEach(b => {
            const d = b.details || {};
            if (b.type === 'flight') {
                events.push({
                    uid: b.id,
                    summary: `${d.bAirline || 'Flight'} ${d.bFlightNum || ''} (${d.bDepAirport || ''} \u2192 ${d.bArrAirport || ''})`,
                    dtstart: formatICSDate(d.bDepDate, d.bDepTime),
                    dtend: formatICSDate(d.bArrDate || d.bDepDate, d.bArrTime || d.bDepTime),
                    description: d.bConfCode ? 'Confirmation: ' + d.bConfCode + (d.bSeat ? '\\nSeat: ' + d.bSeat : '') : '',
                    location: d.bDepAirport || ''
                });
            } else if (b.type === 'hotel' || b.type === 'airbnb') {
                events.push({
                    uid: b.id,
                    summary: `${d.bName || b.type} (Stay)`,
                    dtstart: formatICSDateAllDay(d.bCheckin),
                    dtend: formatICSDateAllDay(d.bCheckout),
                    allDay: true,
                    description: [d.bConfCode ? 'Confirmation: ' + d.bConfCode : '', d.bWifi ? 'WiFi: ' + d.bWifi : '', d.bAccessCode ? 'Access: ' + d.bAccessCode : ''].filter(Boolean).join('\\n'),
                    location: d.bAddress || ''
                });
            } else if (b.type === 'restaurant') {
                const start = formatICSDate(d.bResDate, d.bResTime);
                const endTime = d.bResTime ? (parseInt(d.bResTime.split(':')[0]) + 2).toString().padStart(2, '0') + ':' + d.bResTime.split(':')[1] : null;
                events.push({
                    uid: b.id,
                    summary: d.bName || 'Restaurant',
                    dtstart: start,
                    dtend: formatICSDate(d.bResDate, endTime || d.bResTime),
                    description: d.bConfCode ? 'Confirmation: ' + d.bConfCode + (d.bPartySize ? '\\nParty: ' + d.bPartySize : '') : '',
                    location: d.bAddress || ''
                });
            } else {
                const dateKey = d.bActDate || d.bMeetDate || d.bPickupDate || b.date;
                const timeKey = d.bActTime || d.bMeetTime || d.bPickupTime || b.time;
                if (dateKey) {
                    const endTimeVal = timeKey ? (parseInt(timeKey.split(':')[0]) + 1).toString().padStart(2, '0') + ':' + timeKey.split(':')[1] : null;
                    events.push({
                        uid: b.id,
                        summary: d.bName || b.title || b.type,
                        dtstart: timeKey ? formatICSDate(dateKey, timeKey) : formatICSDateAllDay(dateKey),
                        dtend: timeKey ? formatICSDate(dateKey, endTimeVal) : formatICSDateAllDay(dateKey),
                        allDay: !timeKey,
                        description: [d.bConfCode ? 'Confirmation: ' + d.bConfCode : '', d.bNotes || d.bAgenda || ''].filter(Boolean).join('\\n'),
                        location: d.bLocation || d.bAddress || d.bPickupLoc || ''
                    });
                }
            }
        });

        if (events.length === 0) {
            showToast('No bookings to export', 'info');
            return;
        }

        generateICS(events, `${trip.title.replace(/[^a-zA-Z0-9]/g, '_')}.ics`);
    }

    function exportAllICS() {
        const events = [];
        state.trips.forEach(trip => {
            (trip.bookings || []).forEach(b => {
                const d = b.details || {};
                const dateKey = d.bDepDate || d.bCheckin || d.bResDate || d.bActDate || d.bMeetDate || d.bPickupDate || b.date;
                if (dateKey) {
                    events.push({
                        uid: b.id,
                        summary: `[${trip.title}] ${b.title || b.type}`,
                        dtstart: formatICSDateAllDay(dateKey),
                        dtend: formatICSDateAllDay(dateKey),
                        allDay: true,
                        location: d.bAddress || d.bLocation || d.bDepAirport || ''
                    });
                }
            });
        });
        if (events.length === 0) { showToast('No bookings to export', 'info'); return; }
        generateICS(events, 'travelflow_all_trips.ics');
    }

    // ===== SHARE VIEW =====
    function showShareLink() {
        if (!currentTripId && state.trips.length > 0) {
            showToast('Open a trip first to share it', 'info');
            return;
        }
        if (currentTripId) {
            const url = `${window.location.origin}${window.location.pathname}?share=${currentTripId}&token=${getToken()}`;
            copyText(url, 'share link');
        }
    }

    function renderShareView() {
        const tripId = getShareTripId();
        const trip = state.trips.find(t => t.id === tripId);
        if (!trip) {
            document.getElementById('appContainer').innerHTML = '<div class="empty-state" style="padding:80px 20px;"><h3>Trip not found</h3><p>This share link may be invalid.</p></div>';
            return;
        }

        // Hide nav actions and bottom tabs in share mode
        document.querySelector('.app-nav-actions').style.display = 'none';
        document.querySelector('.bottom-tabs').style.display = 'none';

        // Show a minimal view
        showView('viewDetail');
        currentTripId = tripId;
        renderTripDetail(tripId);

        // Add share banner
        const header = document.getElementById('detailHeader');
        header.insertAdjacentHTML('afterbegin', '<div class="share-banner">You\'re viewing a shared itinerary (read-only)</div>');

        // Hide edit/delete buttons
        document.querySelectorAll('.detail-actions, .booking-actions, .btn-icon.danger').forEach(el => el.style.display = 'none');
        document.querySelector('.detail-back').style.display = 'none';
    }

    // ===== TAB SWITCHING =====
    function switchTab(btn) {
        document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
    }

    // ===== ESCAPE HTML =====
    function esc(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // ===== RENDER ALL =====
    function renderAll() {
        autoUpdateStatuses();
        renderTimeline();
        renderTripCards();
    }

    // ===== INIT =====
    async function init() {
        await fetchTrips();
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('appContainer').style.display = 'block';

        if (isShareMode()) {
            renderShareView();
        } else {
            renderAll();
        }

        // Preserve token in nav links
        const token = getToken();
        if (token) {
            const tfLink = document.getElementById('navTaskflow');
            tfLink.href = `index.html?token=${token}`;
        }
    }

    // Keyboard shortcut: Escape closes modals
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
            document.getElementById('confirmOverlay').classList.remove('active');
            document.body.style.overflow = '';
        }
    });

    init();
    </script>
