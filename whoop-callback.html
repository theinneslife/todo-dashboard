<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whoop Auth Callback</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 500px; margin: 100px auto; padding: 0 24px; text-align: center; color: #1a1a2e; }
    h1 { font-size: 1.5rem; color: #5b21b6; }
    p { color: #666; }
  </style>
</head>
<body>
  <h1>✓ Authorization Complete</h1>
  <p>You have successfully authorized WHOOP. You may close this tab.</p>
  <script>
    // Capture the authorization code from the URL if present
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    if (code) {
      document.querySelector("p").textContent = "Authorization code received. You may close this tab.";
    }
  </script>
</body>
</html>
